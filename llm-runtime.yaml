providers:
  groq:
    api_key_env: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
  google:
    api_key_env: GOOGLE_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  mistral:
    api_key_env: MISTRAL_API_KEY
    base_url: https://api.mistral.ai/v1
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1

cognitive_roles:
  planner:
    provider: groq
    model: openai/gpt-oss-120b
  action_verifier:
    provider: openai
    model: gpt-4o-mini
  superego_primary:
    provider: openai
    model: gpt-4o-mini
  superego_escalation:
    provider: openai
    model: gpt-5-mini
  meta_reasoner:
    provider: groq
    model: openai/gpt-oss-120b
  meta_reasoner_fallback:
    provider: openai
    model: gpt-5-mini
  memory_advisor:
    provider: openai
    model: gpt-4.1-mini

web_search:
  provider: google
  model: gemini-2.5-flash

model_catalog:
  openai:
    - model: gpt-5
      tier: medium_high
      token_weight: 2.60
      context_window: 128000
      input_cost_per_million_tokens_usd: 1.25
      output_cost_per_million_tokens_usd: 10.0
