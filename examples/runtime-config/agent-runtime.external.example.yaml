# Minimal local operator overlay.
# Decisions made here:
# - keep the dashboard on
# - disable assignment
# - disable autonomous background action-control work
# - disable Telegram and Google Workspace until explicitly configured

app:
  dashboard_enabled: true
  dashboard_port: 8787

agent:
  persona:
    name: Neo
  assignment:
    enabled: false
  action_control:
    autonomous_worker_enabled: false
  native_integrations:
    telegram:
      enabled: false
    google_workspace:
      enabled: false
