name: CI

on:
  push:
    branches:
      - dev
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 23 (Corretto)
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "23"
          cache: gradle

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install CI dependencies
        run: sudo apt-get update && sudo apt-get install -y bats ripgrep

      - name: Freud deterministic PR gate
        id: freud_pr_gate
        run: freud/scripts/feature-loop.sh ci-pr --config freud/config/ci-pr.env

      - name: Freud run summary
        if: always()
        run: |
          if [[ ! -f .psyke/runs/freud/latest-run.txt ]]; then
            echo "No Freud run directory was produced."
            exit 0
          fi
          run_dir="$(cat .psyke/runs/freud/latest-run.txt)"
          echo "FREUD_CI_RUN_DIR=$run_dir" >> "$GITHUB_ENV"
          echo "Freud run dir: $run_dir"
          if [[ -f "$run_dir/artifacts/summary-compact.md" ]]; then
            echo "=== Freud summary-compact ==="
            cat "$run_dir/artifacts/summary-compact.md"
          elif [[ -f "$run_dir/artifacts/summary.json" ]]; then
            echo "=== Freud summary.json ==="
            cat "$run_dir/artifacts/summary.json"
          fi
          if [[ -f "$run_dir/artifacts/summary.json" ]]; then
            first_failed_step="$(jq -r '.first_failed_step // empty' "$run_dir/artifacts/summary.json")"
            if [[ -n "$first_failed_step" && "$first_failed_step" != "null" ]]; then
              echo "::error title=Freud step failed::$first_failed_step failed; inspect the uploaded freud artifact for the full run."
              step_log="$run_dir/logs/$(case "$first_failed_step" in \
                preflight_compile) echo '00-preflight-compile.log' ;; \
                targeted_tests) echo '01-targeted-tests.log' ;; \
                full_tests) echo '02-full-tests.log' ;; \
                scenario_pack) echo '03-scenario-pack.log' ;; \
                reasoning_eval_logic) echo '04-reasoning-eval-logic.log' ;; \
                reasoning_eval_model) echo '05-reasoning-eval-model.log' ;; \
                memory_live_smoke) echo '06-memory-live-smoke.log' ;; \
                *) echo '' ;; \
              esac)"
              if [[ -n "$step_log" && -f "$step_log" ]]; then
                echo "::group::Freud failing step tail: $first_failed_step"
                echo "=== Tail of failing Freud log: $first_failed_step ==="
                tail -n 200 "$step_log"
                echo "::endgroup::"
              fi
            fi
          fi

      - name: Upload Freud artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: freud-ci-pr-${{ github.run_id }}
          path: ${{ env.FREUD_CI_RUN_DIR }}
          if-no-files-found: warn
          retention-days: 7

      - name: Freud shell tests
        id: freud_shell_tests
        run: |
          bats freud/tests/test_live_eval.bats \
            freud/tests/test_feature_loop_env.bats \
            freud/tests/test_reasoning_pr_gate.bats \
            freud/tests/test_step_filtering.bats \
            freud/tests/test_scenarios.bats \
            freud/tests/test_context_pack.bats \
            freud/tests/test_triage.bats \
            freud/tests/test_summarize.bats \
            freud/tests/test_telemetry.bats \
            freud/tests/test_helpers.bats \
            freud/tests/test_bbh_smoke.bats

      - name: Freud Python tests
        id: freud_python_tests
        run: |
          python3 -m venv freud/.venv
          freud/.venv/bin/pip install pytest
          PYTHONPATH=. freud/.venv/bin/pytest freud/tests/test_*_py.py freud/tests/test_common.py -v

      - name: CI job summary
        if: always()
        run: |
          overall_status="pass"
          {
            echo "# CI Summary"
            echo
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| Freud deterministic PR gate | ${{ steps.freud_pr_gate.outcome || 'skipped' }} |"
            echo "| Freud shell tests | ${{ steps.freud_shell_tests.outcome || 'skipped' }} |"
            echo "| Freud Python tests | ${{ steps.freud_python_tests.outcome || 'skipped' }} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${FREUD_CI_RUN_DIR:-}" ]]; then
            {
              echo "## Freud Run"
              echo
              echo "- Run dir: \`${FREUD_CI_RUN_DIR}\`"
              echo "- Uploaded artifact: \`freud-ci-pr-${{ github.run_id }}\`"
              echo
            } >> "$GITHUB_STEP_SUMMARY"
            if [[ -f "${FREUD_CI_RUN_DIR}/artifacts/summary-compact.md" ]]; then
              {
                echo "### Freud Summary"
                echo
                cat "${FREUD_CI_RUN_DIR}/artifacts/summary-compact.md"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            elif [[ -f "${FREUD_CI_RUN_DIR}/artifacts/summary.json" ]]; then
              {
                echo "### Freud Summary JSON"
                echo
                echo '```json'
                cat "${FREUD_CI_RUN_DIR}/artifacts/summary.json"
                echo '```'
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          for step_name in freud_pr_gate freud_shell_tests freud_python_tests; do
            outcome="$(printenv "STEP_OUTCOME_${step_name^^}")"
            if [[ "$outcome" == "failure" ]]; then
              overall_status="fail"
            fi
          done

          if [[ "$overall_status" == "pass" ]]; then
            echo "::notice title=CI summary::All configured CI steps passed."
          else
            echo "::error title=CI summary::One or more CI steps failed. See the job summary and uploaded Freud artifact."
            exit 1
          fi
        env:
          STEP_OUTCOME_FREUD_PR_GATE: ${{ steps.freud_pr_gate.outcome || 'skipped' }}
          STEP_OUTCOME_FREUD_SHELL_TESTS: ${{ steps.freud_shell_tests.outcome || 'skipped' }}
          STEP_OUTCOME_FREUD_PYTHON_TESTS: ${{ steps.freud_python_tests.outcome || 'skipped' }}
