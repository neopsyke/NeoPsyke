name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: freud/go.mod
          cache: true
          cache-dependency-path: freud/go.sum

      - name: Bootstrap Freud CLI
        run: ./freud/bootstrap.sh

      - name: Freud internal Go tests
        id: freud_go_tests
        run: cd freud && go test ./internal/...

      - name: Freud deterministic PR gate
        id: freud_pr_gate
        run: ./freud/bin/freud run signoff-gate

      - name: Freud run summary
        if: always()
        run: |
          if [[ ! -f .neopsyke/runs/freud/run-index.tsv ]]; then
            echo "No Freud run directory was produced."
            exit 0
          fi
          run_dir="$(tail -n 1 .neopsyke/runs/freud/run-index.tsv | cut -f3)"
          if [[ -z "$run_dir" ]]; then
            echo "No Freud run directory was recorded in run-index.tsv."
            exit 0
          fi
          echo "FREUD_CI_RUN_DIR=$run_dir" >> "$GITHUB_ENV"
          echo "Freud run dir: $run_dir"
          if [[ -f "$run_dir/artifacts/summary-compact.md" ]]; then
            echo "=== Freud summary-compact ==="
            cat "$run_dir/artifacts/summary-compact.md"
          elif [[ -f "$run_dir/artifacts/summary.json" ]]; then
            echo "=== Freud summary.json ==="
            cat "$run_dir/artifacts/summary.json"
          fi
          if [[ -f "$run_dir/artifacts/summary.json" ]]; then
            first_failed_step="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("first_failed_step", "") or "")' "$run_dir/artifacts/summary.json")"
            if [[ -n "$first_failed_step" && "$first_failed_step" != "null" ]]; then
              echo "::error title=Freud step failed::$first_failed_step failed; inspect the uploaded freud artifact for the full run."
              step_log="$run_dir/logs/$(case "$first_failed_step" in \
                preflight_compile) echo '00-preflight_compile.log' ;; \
                targeted_tests) echo '01-targeted_tests.log' ;; \
                full_tests) echo '02-full_tests.log' ;; \
                scenario_pack) echo '03-scenario_pack.log' ;; \
                reasoning_eval_logic) echo '04-reasoning_eval_logic.log' ;; \
                reasoning_eval_model) echo '05-reasoning_eval_model.log' ;; \
                memory_live_smoke) echo '06-memory_live_smoke.log' ;; \
                test_freud_replay) echo '07-test_freud_replay.log' ;; \
                *) echo '' ;; \
              esac)"
              if [[ -n "$step_log" && -f "$step_log" ]]; then
                echo "::group::Freud failing step tail: $first_failed_step"
                echo "=== Tail of failing Freud log: $first_failed_step ==="
                tail -n 200 "$step_log"
                echo "::endgroup::"
              fi
            fi
          fi

      - name: Upload Freud artifacts
        if: always() && env.FREUD_CI_RUN_DIR != ''
        uses: actions/upload-artifact@v6
        with:
          name: freud-signoff-gate-${{ github.run_id }}
          path: ${{ env.FREUD_CI_RUN_DIR }}
          if-no-files-found: warn
          retention-days: 7

      - name: CI job summary
        if: always()
        run: |
          overall_status="pass"
          {
            echo "# CI Summary"
            echo
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| Freud deterministic PR gate | ${{ steps.freud_pr_gate.outcome || 'skipped' }} |"
            echo "| Freud internal Go tests | ${{ steps.freud_go_tests.outcome || 'skipped' }} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${FREUD_CI_RUN_DIR:-}" ]]; then
            {
              echo "## Freud Run"
              echo
              echo "- Run dir: \`${FREUD_CI_RUN_DIR}\`"
              echo "- Uploaded artifact: \`freud-signoff-gate-${{ github.run_id }}\`"
              echo
            } >> "$GITHUB_STEP_SUMMARY"
            if [[ -f "${FREUD_CI_RUN_DIR}/artifacts/summary-compact.md" ]]; then
              {
                echo "### Freud Summary"
                echo
                cat "${FREUD_CI_RUN_DIR}/artifacts/summary-compact.md"
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            elif [[ -f "${FREUD_CI_RUN_DIR}/artifacts/summary.json" ]]; then
              {
                echo "### Freud Summary JSON"
                echo
                echo '```json'
                cat "${FREUD_CI_RUN_DIR}/artifacts/summary.json"
                echo '```'
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          for step_name in freud_pr_gate freud_go_tests; do
            outcome="$(printenv "STEP_OUTCOME_${step_name^^}")"
            if [[ "$outcome" == "failure" ]]; then
              overall_status="fail"
            fi
          done

          if [[ "$overall_status" == "pass" ]]; then
            echo "::notice title=CI summary::All configured CI steps passed."
          else
            echo "::error title=CI summary::One or more CI steps failed. See the job summary and uploaded Freud artifact."
            exit 1
          fi
        env:
          STEP_OUTCOME_FREUD_PR_GATE: ${{ steps.freud_pr_gate.outcome || 'skipped' }}
          STEP_OUTCOME_FREUD_GO_TESTS: ${{ steps.freud_go_tests.outcome || 'skipped' }}
