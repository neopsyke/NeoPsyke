mode: default

defaultProvider:
  provider: neopsyke-pgvector-memory
  transport: http
  baseUrl: http://127.0.0.1:7841
  # Expected standalone install location. Until default bootstrap/download exists,
  # local dev can override this with NEOPSYKE_MEMORY_DEFAULT_COMMAND.
  command: "java -jar .neopsyke/providers/neopsyke-pgvector-memory/current/neopsyke-pgvector-memory-all.jar --transport=http --port=7841"
  startupTimeoutMs: 12000
  healthTimeoutMs: 3000
  namespace: neopsyke

externalProvider:
  # Advanced mode: point NeoPsyke at a compatible external HTTP memory provider.
  # v1 supports only transport=http here. MCP remains available in the provider
  # project as an optional adapter, but NeoPsyke does not use it for external mode yet.
  provider: custom-http-memory
  transport: http
  baseUrl: ""
  namespace: neopsyke
