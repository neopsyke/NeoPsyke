time:
  enabled: true
  mode: stdio
  provider: mcp-server-time
  command: "uvx mcp-server-time"
  fallback_commands:
    - "python -m mcp_server_time"

fetch:
  enabled: true
  mode: native
  provider: native-jvm

memory:
  enabled: true
  mode: stdio
  provider: pgvector
  command: "java -jar mcp-memory-pgvector/build/libs/mcp-memory-pgvector-0.1.0-all.jar"
