time:
  enabled: true
  mode: stdio
  provider: mcp-server-time
  command: "uvx mcp-server-time"
  fallback_commands:
    - "python -m mcp_server_time"

fetch:
  enabled: true
  mode: native
  provider: native-jvm

memory:
  enabled: true
  mode: stdio
  provider: auto
  command: "npx -y @modelcontextprotocol/server-memory"
  fallback_commands:
    - "uvx mcp-server-memory"
