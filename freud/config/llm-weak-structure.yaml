providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1
    default_model: claude-sonnet-4-20250514
    default_web_search_model: claude-sonnet-4-20250514
  groq:
    api_key_env: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    default_model: openai/gpt-oss-20b
    default_web_search_model: groq/compound-mini
  google:
    api_key_env: GOOGLE_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    default_model: gemini-2.5-flash
    default_web_search_model: gemini-2.5-flash
  mistral:
    api_key_env: MISTRAL_API_KEY
    base_url: https://api.mistral.ai/v1
    default_model: mistral-small-2506
    default_web_search_model: mistral-small-2506
  ollama:
    api_key_env: OLLAMA_API_KEY
    base_url: http://localhost:11434/api
    default_model: gpt-oss
    default_web_search_model: gpt-oss
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    default_model: gpt-4o-mini
    default_web_search_model: gpt-4o-mini

cognitive_roles:
  planner:
    provider: groq
    model: openai/gpt-oss-20b
  action_verifier:
    provider: openai
    model: gpt-4o-mini
  superego_primary:
    provider: openai
    model: gpt-4o-mini
  superego_escalation:
    provider: openai
    model: gpt-4.1-mini
  meta_reasoner:
    provider: groq
    model: openai/gpt-oss-20b
  meta_reasoner_fallback:
    provider: openai
    model: gpt-5-mini
  memory_advisor:
    provider: openai
    model: gpt-4.1-mini
  approval_interpreter:
    provider: openai
    model: gpt-5-nano

web_search:
  provider: groq
  model: groq/compound-mini

