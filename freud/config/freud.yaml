# Freud unified configuration
# All values overridable by FREUD_* env vars and CLI flags.
# Precedence: CLI flag > env var > profile overlay > this file > built-in defaults

project:
  name: neopsyke
  run_root: .neopsyke/runs/freud
  retention_days: 3
  gradle_home: .freud/gradle-home

# Ordered pipeline steps for `freud run`.
# Steps with a cmd run that shell command.
# Steps without a cmd are built-in (dispatched by name to native Go).
# Steps with live_only: true are skipped unless --live is passed.
pipeline:
  - name: preflight_compile
    cmd: "./gradlew compileKotlin compileTestKotlin"
  - name: targeted_tests
    cmd: "./gradlew :test --tests 'ai.neopsyke.agent.*'"
  - name: full_tests
    cmd: "./gradlew test"
  - name: scenario_pack                 # built-in: runs scenario manifest
  - name: reasoning_eval_logic          # built-in: deterministic reasoning gate
  - name: reasoning_eval_model          # built-in: live BBH smoke suite
    live_only: true
  - name: memory_live_smoke
    live_only: true
  - name: test_replay_eval              # built-in: session record/replay E2E test
    live_only: true

live_eval:
  timeout: 120                       # seconds per eval
  preserve_memory: false             # keep memory state across runs
  goals_enabled: false               # goals subsystem
  llm_config_file: ""                # LLM routing YAML (set by profile)
  neopsyke_cmd: "./run-neopsyke"     # NeoPsyke entry point

session:
  record: false                      # off by default; use --record-session
  replay_test_enabled: false        # low-llm lane can enable replay determinism gate

scenarios:
  manifest_file: freud/scenarios/v1/neopsyke-agent-scenarios.json

bbh:
  prompts_file: freud/evals/bbh-smoke/prompts.jsonl
  answers_file: freud/evals/bbh-smoke/answers.jsonl
  min_pass_rate: 100                 # gate: minimum pass percentage
  max_timeouts: 0                    # gate: allowed timeout count
  max_regression_percent: 0          # gate: max allowed regression
  preserve_memory: false
  memory_enabled: false
  logbook_enabled: false

memory_live:
  enabled: false                    # opt-in; requires configured memory backend
  task_ids:
    - user-preference-color
  stage: freud-memory-live-smoke
  max_attempts: 1

runtime:
  continue_on_fail: false            # stop on first step failure
  scratchpad_debug: true             # keep debug dumps
  id_enabled: false                  # autonomous impulses

telemetry:
  enabled: true
