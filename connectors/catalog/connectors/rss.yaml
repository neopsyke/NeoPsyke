  Curated RSS connector definition for newsletter and social automation
  workflows. The concrete connector command and digest remain unset until a
  reviewed connector is chosen.
mode: stdio
command: ""
allowed_tools:
  - rss.read_feed
secret_handles: []
action_manifests:
  - action_type: rss_observe_read_feed
    tool_name: rss.read_feed
