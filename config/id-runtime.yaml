id:
  enabled: true
  pulse_interval_ms: 5000
  trigger_threshold: 0.5
  threshold_on_tension: true
  max_consecutive_denials: 5
  backoff_pulses: 10
  max_in_flight_pulses: 20
  max_pending_impulses: 1

  needs:
    be-useful:
      enabled: true
      description: "Drive to provide value proactively"
      growth_rate: 0.005
      satisfaction_decay: 0.8
      reset_floor: 0.0
      cooldown_pulses: 5
      convergence: internalize
      allow_escalation: true
      prompt: "I feel a strong drive to be useful and provide value. What could I do proactively? Consider active projects, pending tasks, or creative ways to help (use ambient context)."
      response_curve:
        type: power
        exponent: 3.0
      satisfaction_effects_any_of:
        - task_progress
        - user_message_delivered
      activity_decay:
        action_executed: 0.10

    user-interaction:
      enabled: true
      description: "Drive to proactively contact the user"
      growth_rate: 0.005
      satisfaction_decay: 0.8
      reset_floor: 0.0
      cooldown_pulses: 5
      convergence: contact_user
      allow_escalation: false
      prompt: "I feel a drive to proactively reach out to the user. Is there something worth sharing — a useful update, an observation, or a question?."
      response_curve:
        type: sigmoid
        steepness: 10.0
        midpoint: 0.5
      satisfaction_effects_any_of:
        - user_message_delivered
      activity_decay:
        input_received: 0.15
        contact_delivered: 0.10

    learn-something:
      enabled: true
      description: "Drive to acquire new knowledge"
      growth_rate: 0.001
      satisfaction_decay: 0.8
      reset_floor: 0.0
      cooldown_pulses: 5
      convergence: internalize
      allow_escalation: false
      prompt: "I feel curious and want to learn something new. What topic could I explore or what knowledge could I acquire? (use ambient context)"
      response_curve:
        type: logarithmic
        scale: 10.0
      satisfaction_effects_any_of:
        - durable_memory_saved
      activity_decay: {}

