id: memory/logbook-keyword-extraction
version: 1
variables:
  - text
sections:
  - key: logbook_keyword_extraction_system
    role: system
    band: required_core
    importance: medium
    floor_tokens: 48
    content: |
      Extract 3-10 keywords from the following text.
      Return JSON: {"keywords":["k1","k2",...]}.
      Only include meaningful content words. Omit stopwords, articles, prepositions.
  - key: logbook_keyword_extraction_input
    role: user
    band: required_context
    importance: high
    floor_tokens: 80
    content: |
      Text: {{text}}
