<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeoPsyke Dashboard</title>
  <style>
    :root {
      --bg: #0f1a1f;
      --panel: #16272e;
      --line: #27414d;
      --text: #d9e7eb;
      --muted: #98b0b9;
      --accent: #36c3a7;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: radial-gradient(circle at 20% 0%, #17303a 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }
    header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title-wrap {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .shell-status {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(15, 26, 31, 0.55);
    }
    nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px 12px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }
    .tab-link {
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      white-space: nowrap;
      background: rgba(15, 26, 31, 0.45);
    }
    .tab-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .tab-link.active {
      color: var(--accent);
      border-color: rgba(54, 195, 167, 0.55);
      background: rgba(54, 195, 167, 0.12);
    }
    .frame-wrap {
      min-height: 0;
      padding: 12px;
      position: relative;
    }
    .frame {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 26, 31, 0.6);
      display: none;
    }
    .frame.active {
      display: block;
    }
    @media (max-width: 900px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-wrap">
      <strong>NeoPsyke Dashboard</strong>
      <span class="subtitle">Single-tab shell with route-based tabs</span>
    </div>
    <div id="shell-status" class="shell-status">Loading tab...</div>
  </header>

  <nav id="tab-nav">
    <a class="tab-link" data-tab="conversations" href="/">Conversations</a>
    <a class="tab-link" data-tab="observability" href="/dashboard">Observability</a>
    <a class="tab-link" data-tab="metrics" href="/metrics">Metrics</a>
    <a class="tab-link" data-tab="goals" href="/goals">Goals</a>
    <a class="tab-link" data-tab="action-control" href="/action-control">Action Control</a>
  </nav>

  <div id="frame-wrap" class="frame-wrap"></div>

  <script>
    const TAB_CONFIG = {
      "conversations": {
        path: "/",
        title: "NeoPsyke Conversations",
        framePath: "/__dashboard/conversations"
      },
      "observability": {
        path: "/dashboard",
        title: "NeoPsyke Observability",
        framePath: "/__dashboard/observability"
      },
      "metrics": {
        path: "/metrics",
        title: "NeoPsyke Metrics",
        framePath: "/__dashboard/metrics"
      },
      "goals": {
        path: "/goals",
        title: "NeoPsyke Goals",
        framePath: "/__dashboard/goals"
      },
      "action-control": {
        path: "/action-control",
        title: "NeoPsyke Action Control",
        framePath: "/__dashboard/action-control"
      }
    };

    function tabFromPath(pathname) {
      switch (pathname) {
        case "/":
          return "conversations";
        case "/dashboard":
          return "observability";
        case "/metrics":
          return "metrics";
        case "/goals":
          return "goals";
        case "/action-control":
          return "action-control";
        default:
          return "conversations";
      }
    }

    const frameWrap = document.getElementById("frame-wrap");
    const status = document.getElementById("shell-status");
    const nav = document.getElementById("tab-nav");
    const framesByTab = new Map();
    const dashboardEventBuffer = [];
    const conversationEventBuffer = new Map();
    const DASHBOARD_BUFFER_LIMIT = 400;
    const CONVERSATION_BUFFER_LIMIT = 200;
    let activeTab = null;
    let dashboardSource = null;
    let conversationSource = null;
    let selectedConversationSessionId = null;

    function pushLimited(buffer, item, limit) {
      buffer.push(item);
      if (buffer.length > limit) {
        buffer.splice(0, buffer.length - limit);
      }
    }

    function postToFrame(frame, message) {
      if (!frame || !frame.contentWindow) return;
      frame.contentWindow.postMessage(message, window.location.origin);
    }

    function broadcastToFrames(message, targetTabs) {
      framesByTab.forEach((frame, frameTab) => {
        if (targetTabs && !targetTabs.includes(frameTab)) return;
        postToFrame(frame, message);
      });
    }

    function sendDashboardBootstrap(frame) {
      postToFrame(frame, {
        type: "neopsyke-dashboard-bootstrap",
        events: dashboardEventBuffer.slice()
      });
    }

    function sendConversationBootstrap(sessionId) {
      if (!sessionId) return;
      const events = conversationEventBuffer.get(sessionId);
      if (!events || !events.length) return;
      const frame = framesByTab.get("conversations");
      if (!frame) return;
      postToFrame(frame, {
        type: "neopsyke-conversation-bootstrap",
        sessionId: sessionId,
        events: events.slice()
      });
    }

    function forwardDashboardEvent(eventName, payload) {
      const message = { eventName, payload };
      pushLimited(dashboardEventBuffer, message, DASHBOARD_BUFFER_LIMIT);
      broadcastToFrames({
        type: "neopsyke-dashboard-event",
        eventName: eventName,
        payload: payload
      });
    }

    function connectDashboardStream() {
      if (dashboardSource) return;
      const es = new EventSource("/api/dashboard/events");
      dashboardSource = es;
      es.addEventListener("open", () => {
        const activeConfig = TAB_CONFIG[activeTab] || TAB_CONFIG.conversations;
        status.textContent = "Active tab: " + activeConfig.title;
      });
      es.addEventListener("error", () => {
        status.textContent = "Dashboard stream reconnecting...";
      });
      ["agent", "action-control", "id-thinking"].forEach((eventName) => {
        es.addEventListener(eventName, (event) => {
          forwardDashboardEvent(eventName, event.data);
        });
      });
    }

    function disconnectConversationStream() {
      if (!conversationSource) return;
      conversationSource.close();
      conversationSource = null;
    }

    function forwardConversationEvent(sessionId, eventName, payload) {
      const message = { eventName, payload };
      const buffer = conversationEventBuffer.get(sessionId) || [];
      pushLimited(buffer, message, CONVERSATION_BUFFER_LIMIT);
      conversationEventBuffer.set(sessionId, buffer);
      broadcastToFrames({
        type: "neopsyke-conversation-event",
        sessionId: sessionId,
        eventName: eventName,
        payload: payload
      }, ["conversations"]);
    }

    function connectConversationStream(sessionId) {
      if (!sessionId) {
        selectedConversationSessionId = null;
        disconnectConversationStream();
        return;
      }
      if (selectedConversationSessionId === sessionId && conversationSource) {
        return;
      }
      selectedConversationSessionId = sessionId;
      disconnectConversationStream();
      const es = new EventSource("/api/chat/sessions/" + encodeURIComponent(sessionId) + "/stream");
      conversationSource = es;
      es.addEventListener("chat", (event) => {
        forwardConversationEvent(sessionId, "chat", event.data);
      });
      es.addEventListener("thinking", (event) => {
        forwardConversationEvent(sessionId, "thinking", event.data);
      });
    }

    function postVisibility(frame, visible) {
      postToFrame(
        frame,
        { type: "neopsyke-shell-visibility", visible: visible },
      );
    }

    function ensureFrame(tab) {
      if (framesByTab.has(tab)) {
        return framesByTab.get(tab);
      }
      const config = TAB_CONFIG[tab];
      const frame = document.createElement("iframe");
      frame.className = "frame";
      frame.title = config.title;
      frame.dataset.tab = tab;
      frame.src = config.framePath;
      frame.addEventListener("load", () => {
        sendDashboardBootstrap(frame);
        if (tab === "conversations" && selectedConversationSessionId) {
          sendConversationBootstrap(selectedConversationSessionId);
        }
        if (activeTab === tab) {
          postVisibility(frame, true);
          status.textContent = "Active tab: " + config.title;
        } else {
          postVisibility(frame, false);
        }
      });
      framesByTab.set(tab, frame);
      frameWrap.appendChild(frame);
      return frame;
    }

    function renderTabs() {
      nav.querySelectorAll("[data-tab]").forEach((link) => {
        link.classList.toggle("active", link.getAttribute("data-tab") === activeTab);
      });
    }

    function loadTab(tab, updateHistory) {
      const config = TAB_CONFIG[tab] || TAB_CONFIG.conversations;
      activeTab = tab in TAB_CONFIG ? tab : "conversations";
      renderTabs();
      status.textContent = "Active tab: " + config.title;
      document.title = config.title;
      ensureFrame(activeTab);
      framesByTab.forEach((frame, frameTab) => {
        const visible = frameTab === activeTab;
        frame.classList.toggle("active", visible);
        postVisibility(frame, visible);
      });
      if (updateHistory) {
        history.pushState({ tab: activeTab }, "", config.path);
      }
    }

    nav.addEventListener("click", (event) => {
      const link = event.target.closest("[data-tab]");
      if (!link) return;
      if (event.defaultPrevented || event.button !== 0) return;
      if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
      event.preventDefault();
      loadTab(link.getAttribute("data-tab"), true);
    });

    window.addEventListener("popstate", () => {
      loadTab(tabFromPath(window.location.pathname), false);
    });

    window.addEventListener("message", (event) => {
      if (event.origin !== window.location.origin) return;
      if (!event.data || typeof event.data.type !== "string") return;
      if (event.data.type === "neopsyke-conversation-select") {
        connectConversationStream(event.data.sessionId || null);
        sendConversationBootstrap(event.data.sessionId || null);
      }
    });

    connectDashboardStream();
    loadTab(tabFromPath(window.location.pathname), false);
  </script>
</body>
</html>
